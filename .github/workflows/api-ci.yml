name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'hardening/**'
      - 'ops/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'hardening/**'
      - 'ops/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ruff check (lint - self-owned dirs only)
        # Round 1 policy: lint self-owned code strictly; leave upstream
        # app/ untouched until we do a deliberate cleanup sweep. Widening
        # to `ruff check .` is a full-repo churn event; don't do it here.
        run: ruff check hardening deploy ops tests

      - name: ruff format --check (style - self-owned dirs only)
        run: ruff format --check hardening deploy ops tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          # In-memory DB so the suite needs no services.
          SQLALCHEMY_DATABASE_URL: 'sqlite:///:memory:'
        run: pytest --cov --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # PostgreSQL matrix — catches PG-specific DDL / dialect drift in
  # Alembic migrations and raw-query code paths. Kept as a separate
  # job (not a matrix on `test`) so branch protection rules that
  # require "Test (pytest)" by name don't need rewiring.
  #
  # Intentionally uses the same pytest invocation as the SQLite job,
  # just with a PG connection URL. Tests that need a real PG (e.g.
  # the existing migrations test that skips on SQLite) will run here
  # for real coverage; the rest simply execute under PG and catch any
  # dialect-specific surprises.
  test-postgres:
    name: Test (pytest, PostgreSQL 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aegis_test
          POSTGRES_PASSWORD: aegis_test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest against PostgreSQL 16
        env:
          SQLALCHEMY_DATABASE_URL: 'postgresql+psycopg://aegis_test:aegis_test@localhost:5432/aegis_test'
        run: pytest --no-cov

  # Stepped-upgrade check — catches "already-merged Alembic revision
  # was mutated" bugs that fresh-DB CI (test-postgres above) cannot see.
  #
  # Context: fresh-DB CI runs the full migration chain from init on
  # every PR, so even if a PR rewrites an already-merged revision's
  # upgrade() body, CI still creates the new tables because it runs
  # the mutated body from scratch. Environments that already ran the
  # old body are stuck — alembic_version tracks revision IDs, not
  # content, so the mutated upgrade() never reruns.
  #
  # This job simulates that stuck state: apply the base branch's
  # migrations first, then apply the PR's migrations on top. If the
  # PR mutated an existing revision, alembic will skip it on the
  # second upgrade and the metadata-vs-DDL check will surface the
  # schema gap. See docs/ai-cto/LESSONS.md L-015 / L-016.
  test-alembic-stepped:
    name: Test (alembic stepped upgrade)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aegis_test
          POSTGRES_PASSWORD: aegis_test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SQLALCHEMY_DATABASE_URL: 'postgresql+psycopg://aegis_test:aegis_test@localhost:5432/aegis_test'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can resolve base branch commits.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Resolve base commit
        id: base
        # For pull_request events use the PR base; for push events
        # use the previous commit on main.
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout base migrations
        # Replace only the migration tree with the base's version.
        # Env code stays on PR HEAD so alembic can import the latest
        # target_metadata; the schema it applies is the base's.
        run: |
          git checkout ${{ steps.base.outputs.sha }} -- \
            app/db/migrations/versions/

      - name: Upgrade to base head
        run: alembic upgrade head

      - name: Restore PR migrations
        run: git checkout HEAD -- app/db/migrations/versions/

      - name: Upgrade to PR head
        # If a PR mutated an already-applied revision, this second
        # upgrade is a no-op — alembic skips revisions it thinks are
        # done. The metadata-vs-DDL check below will catch it.
        run: alembic upgrade head

      - name: Metadata vs DDL parity check
        # Compare SQLAlchemy Base.metadata against the live DB schema.
        # If a PR mutated an already-applied revision, metadata will
        # reference a table/column that the DB doesn't have (because
        # the mutated upgrade was skipped above) → diff includes
        # add_table / add_column → job fails.
        #
        # We DO NOT use pytest-alembic's test_upgrade here — it does
        # `downgrade base` then `upgrade head`, which would wipe the
        # stepped state and redo from scratch, defeating this job.
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine
          from alembic.migration import MigrationContext
          from alembic.autogenerate import compare_metadata

          # Import Base with all self-owned models registered.
          # Mirrors app/db/migrations/env.py imports.
          from app.db.base import Base
          import hardening.iplimit.db  # noqa: F401
          try:
              import ops.billing.db  # noqa: F401
          except ImportError:
              pass

          engine = create_engine(os.environ['SQLALCHEMY_DATABASE_URL'])
          with engine.connect() as conn:
              ctx = MigrationContext.configure(conn)
              diff = compare_metadata(ctx, Base.metadata)

          # Only fail on tables/columns the ORM expects but DB lacks.
          # Ignore remove_* diffs (upstream leftover tables not in our metadata).
          missing = [d for d in diff if d[0] in ('add_table', 'add_column')]
          if missing:
              print('METADATA references schema not in DB (mutated migration?):')
              for d in missing:
                  print(' ', d)
              raise SystemExit(1)
          print('metadata matches DB schema')
          PY

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Non-blocking for now: the goal is visibility, not gating. Flip
    # the step back to blocking once we've triaged the initial report.
    # Switched from `safety` to `pip-audit`: safety 3.2.x shipped broken
    # against typer>=0.12 (AttributeError rich_utils), and pip-audit is
    # both actively maintained and backed by PyPA.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: pip-audit (runtime deps)
        continue-on-error: true
        run: pip-audit --requirement requirements.txt --strict
