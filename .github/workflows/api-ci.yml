name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'hardening/**'
      - 'ops/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'hardening/**'
      - 'ops/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ruff check (lint - self-owned dirs only)
        # Round 1 policy: lint self-owned code strictly; leave upstream
        # app/ untouched until we do a deliberate cleanup sweep. Widening
        # to `ruff check .` is a full-repo churn event; don't do it here.
        run: ruff check hardening deploy ops tests

      - name: ruff format --check (style - self-owned dirs only)
        run: ruff format --check hardening deploy ops tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          # In-memory DB so the suite needs no services.
          SQLALCHEMY_DATABASE_URL: 'sqlite:///:memory:'
        run: pytest --cov --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Non-blocking for now: the goal is visibility, not gating. Flip
    # the step back to blocking once we've triaged the initial report.
    # Switched from `safety` to `pip-audit`: safety 3.2.x shipped broken
    # against typer>=0.12 (AttributeError rich_utils), and pip-audit is
    # both actively maintained and backed by PyPA.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: pip-audit (runtime deps)
        continue-on-error: true
        run: pip-audit --requirement requirements.txt --strict
