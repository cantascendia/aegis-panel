name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'hardening/**'
      - 'ops/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'hardening/**'
      - 'ops/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ruff check (lint)
        run: ruff check .

      - name: ruff format --check (style)
        # Only enforce format on our self-owned code. Upstream files in
        # app/ still follow black formatting; reformatting them would
        # explode the upstream-sync diff. Widen the scope when we
        # deliberately take over app/ style.
        run: ruff format --check hardening deploy ops tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          # In-memory DB so the suite needs no services.
          SQLALCHEMY_DATABASE_URL: 'sqlite:///:memory:'
        run: pytest --cov --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: Dependency audit (safety)
    runs-on: ubuntu-latest
    # Non-blocking for now — the goal is visibility, not gating. Flip
    # `continue-on-error: false` once we've triaged the initial report.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install safety
        run: pip install safety==3.2.11

      - name: safety check (runtime deps)
        run: safety check --file requirements.txt --full-report
