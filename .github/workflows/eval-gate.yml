name: Eval Gate

# Auto-enforces 铁律 #12: harness config changes must ship with eval coverage.
#
# Mode history:
#   2026-04-30 → 2026-05-02: advisory (workflow always exit 0)
#   2026-05-02 → present:    ENFORCE — schema failures fail the PR check.
#
# Observation window closed early after 4 days (wave-3..wave-9, 12+ harness PRs,
# 0 false positives). See docs/ai-cto/SPEC-eval-gate.md §Enforcement for the
# decision log.
#
# Escape hatch: set `ALLOW_ADVISORY=1` as a workflow env (or job-level env in a
# fork of this file) for a single emergency PR. Leaves a PR comment trail.
# Default is enforce.

on:
  pull_request:
    paths:
      - 'CLAUDE.md'
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/skills/**'
      - '.claude/rules/**'
      - '.agents/skills/**'
      - 'playbook/**'
      - 'evals/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  eval-gate:
    name: eval-gate
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    env:
      # Override to "1" only as a deliberate, audited bypass for an emergency PR.
      # Keep at "0" (default) so schema failures fail the PR check.
      ALLOW_ADVISORY: "0"
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize shared summary buffer
        shell: bash
        run: |
          # Shared file across steps (GITHUB_STEP_SUMMARY is per-step).
          # Each subsequent bash step appends here; final step reads it.
          echo "EVAL_GATE_SUMMARY=${RUNNER_TEMP}/eval-gate-summary.md" >> "$GITHUB_ENV"
          : > "${RUNNER_TEMP}/eval-gate-summary.md"

      - name: Detect evals/ touch in PR diff
        id: check_evals
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          TOUCHED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^evals/' || true)
          {
            echo "## eval-gate"
            echo ""
            if [ -z "$TOUCHED" ]; then
              echo "⚠️ This PR modifies harness configs but does **not** touch \`evals/\` — 铁律 #12 candidate."
              echo ""
              echo "_Note: missing-eval is still advisory in this revision. Schema failures on existing evals/ ARE enforced (since 2026-05-02)._"
            else
              echo "✅ PR touches \`evals/\` — gate satisfied."
            fi
            echo ""
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$TOUCHED" ]; then
            echo "evals_touched=false" >> "$GITHUB_OUTPUT"
          else
            echo "evals_touched=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run parser on golden-trajectories
        id: runner_golden
        shell: bash
        run: |
          chmod +x scripts/eval-runner.sh
          set +e
          OUTPUT=$(bash scripts/eval-runner.sh evals/golden-trajectories 2>&1)
          STATUS=$?
          set -e
          {
            echo "$OUTPUT"
            echo ""
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "exit_status=$STATUS" >> "$GITHUB_OUTPUT"
          # Enforce mode (since 2026-05-02). Fail CI if any P0 trajectory schema-invalid.
          # Escape hatch: set ALLOW_ADVISORY=1 to bypass (audited; comment trail kept).
          if [ "$STATUS" -ne 0 ] && [ "${ALLOW_ADVISORY:-0}" != "1" ]; then
            echo "::error title=eval-gate::golden-trajectories schema validation FAILED (exit $STATUS). Set ALLOW_ADVISORY=1 to bypass (audited)."
            exit "$STATUS"
          fi
          if [ "$STATUS" -ne 0 ]; then
            echo "::warning title=eval-gate::ALLOW_ADVISORY=1 — bypassing golden-trajectories failure."
          fi

      - name: Run parser on regression
        id: runner_regression
        # Always run so the regression result is captured even when the previous
        # golden-trajectories step exited non-zero in enforce mode (codex P3
        # 2026-05-02: previously regression was skipped on golden failure, which
        # also dropped the audit footer — now footer lives in its own always-run
        # step below, and regression itself still runs for full visibility).
        if: always()
        shell: bash
        run: |
          set +e
          OUTPUT=$(bash scripts/eval-runner.sh evals/regression 2>&1)
          STATUS=$?
          set -e
          {
            echo "$OUTPUT"
            echo ""
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "exit_status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ] && [ "${ALLOW_ADVISORY:-0}" != "1" ]; then
            echo "::error title=eval-gate::regression schema validation FAILED (exit $STATUS). Set ALLOW_ADVISORY=1 to bypass (audited)."
            exit "$STATUS"
          fi
          if [ "$STATUS" -ne 0 ]; then
            echo "::warning title=eval-gate::ALLOW_ADVISORY=1 — bypassing regression failure."
          fi

      - name: Append mode/audit footer (always)
        # Always-run footer step so the PR comment carries the enforce/bypass
        # marker even when an earlier step exited non-zero (codex P3 fix).
        if: always()
        shell: bash
        run: |
          {
            echo "---"
            echo ""
            if [ "${ALLOW_ADVISORY:-0}" = "1" ]; then
              echo "_Posted by [eval-gate workflow](.github/workflows/eval-gate.yml) — **ADVISORY BYPASS ACTIVE** (ALLOW_ADVISORY=1)_"
            else
              echo "_Posted by [eval-gate workflow](.github/workflows/eval-gate.yml) — enforce mode (since 2026-05-02)_"
            fi
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment with summary
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        env:
          EVAL_GATE_SUMMARY: ${{ env.EVAL_GATE_SUMMARY }}
        with:
          script: |
            const fs = require('fs');
            const summaryPath = process.env.EVAL_GATE_SUMMARY;
            let body = '<!-- eval-gate -->\n';
            try {
              body += fs.readFileSync(summaryPath, 'utf8');
            } catch (e) {
              body += '_(failed to read shared summary buffer: ' + e.message + ')_';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
