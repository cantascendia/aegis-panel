name: Eval Gate (advisory)

# Auto-enforces 铁律 #12: harness config changes must ship with eval coverage.
# v1 = advisory mode (never blocks merge). Flips to enforce after 2-week obs
# window per docs/ai-cto/SPEC-eval-gate.md.

on:
  pull_request:
    paths:
      - 'CLAUDE.md'
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/skills/**'
      - '.claude/rules/**'
      - '.agents/skills/**'
      - 'playbook/**'
      - 'evals/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  eval-gate:
    name: eval-gate-advisory
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize shared summary buffer
        shell: bash
        run: |
          # Shared file across steps (GITHUB_STEP_SUMMARY is per-step).
          # Each subsequent bash step appends here; final step reads it.
          echo "EVAL_GATE_SUMMARY=${RUNNER_TEMP}/eval-gate-summary.md" >> "$GITHUB_ENV"
          : > "${RUNNER_TEMP}/eval-gate-summary.md"

      - name: Detect evals/ touch in PR diff
        id: check_evals
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          TOUCHED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^evals/' || true)
          {
            echo "## eval-gate (advisory)"
            echo ""
            if [ -z "$TOUCHED" ]; then
              echo "⚠️ This PR modifies harness configs but does **not** touch \`evals/\` — 铁律 #12 candidate."
              echo ""
              echo "_Advisory only — merge is not blocked. After 2026-05-14 this becomes enforced (per SPEC)._"
            else
              echo "✅ PR touches \`evals/\` — gate satisfied."
            fi
            echo ""
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$TOUCHED" ]; then
            echo "evals_touched=false" >> "$GITHUB_OUTPUT"
          else
            echo "evals_touched=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run parser on golden-trajectories
        id: runner_golden
        shell: bash
        run: |
          chmod +x scripts/eval-runner.sh
          set +e
          OUTPUT=$(bash scripts/eval-runner.sh evals/golden-trajectories 2>&1)
          STATUS=$?
          set -e
          {
            echo "$OUTPUT"
            echo ""
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "exit_status=$STATUS" >> "$GITHUB_OUTPUT"
          # Advisory: do NOT propagate failure to job exit
          exit 0

      - name: Run parser on regression
        id: runner_regression
        shell: bash
        run: |
          set +e
          OUTPUT=$(bash scripts/eval-runner.sh evals/regression 2>&1)
          STATUS=$?
          set -e
          {
            echo "$OUTPUT"
            echo ""
            echo "---"
            echo ""
            echo "_Posted by [eval-gate workflow](.github/workflows/eval-gate.yml) (advisory mode)_"
          } | tee -a "$EVAL_GATE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "exit_status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post PR comment with summary
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          EVAL_GATE_SUMMARY: ${{ env.EVAL_GATE_SUMMARY }}
        with:
          script: |
            const fs = require('fs');
            const summaryPath = process.env.EVAL_GATE_SUMMARY;
            let body = '<!-- eval-gate -->\n';
            try {
              body += fs.readFileSync(summaryPath, 'utf8');
            } catch (e) {
              body += '_(failed to read shared summary buffer: ' + e.message + ')_';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
