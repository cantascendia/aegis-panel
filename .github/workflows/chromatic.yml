name: Chromatic

on: workflow_call

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-chromatic
  cancel-in-progress: true

permissions:
  pull-requests: write
  actions: write
  contents: read

jobs:
  # Graceful skip when CHROMATIC_PROJECT_TOKEN is not configured on the
  # repo. Previously this job hard-failed with "Missing project token"
  # on every dashboard PR, producing a red non-required check that made
  # mergeStateStatus=UNSTABLE for no real reason (see LESSONS.md L-013).
  #
  # Pattern: the `chromatic` job is `needs: gate` and only runs when the
  # gate job sets `run=true`. The gate itself trivially succeeds, so
  # workflows where the token is absent simply show "chromatic" as
  # skipped (green-ish) rather than failed (red).
  gate:
    name: Check Chromatic config
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::CHROMATIC_PROJECT_TOKEN not set on this repo — visual tests skipped. See LESSONS.md L-013 for how to enable."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  chromatic:
    name: Chromatic
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        with:
          version: 8
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install deps
        run: pnpm install

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: ⚡ Run chromatic
        uses: chromaui/action@latest
        id: chromatic
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          workingDir: ./dashboard
          autoAcceptChanges: "main"
          exitOnceUploaded: true
          onlyChanged: true
          skip: "@(renovate/**|dependabot/**)"
          zip: true

      - name: Publish Chromatic Action Summary
        run: echo -e "| Results |  |\n| --- | --- |\n| Build Results | ${{steps.chromatic.outputs.buildUrl}} |\n| Storybook Preview | ${{steps.chromatic.outputs.storybookUrl}} |\n| Component Count | ${{steps.chromatic.outputs.componentCount}} |" >> $GITHUB_STEP_SUMMARY

      - name: Publish Chromatic Link in the comments
        uses: dannyhw/storybook-chromatic-link-comment@v0.11
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-url: ${{ steps.chromatic.outputs.url }}
          build-url: ${{ steps.chromatic.outputs.buildUrl }}
          storybook-url: ${{ steps.chromatic.outputs.storybookUrl }}
