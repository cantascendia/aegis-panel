name: Run Script on Locale Files

on:
  push:
    branches:
      - '*'
  pull_request:

permissions:
  contents: read

jobs:
  find-locales:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find.outputs.files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Find locale JSON files
        id: find
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            files=$(git diff --name-only FETCH_HEAD...HEAD -- 'dashboard/public/locales/*.json')
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              files=$(git diff --name-only "$before" HEAD -- 'dashboard/public/locales/*.json')
            else
              files=$(git diff --name-only HEAD^ HEAD -- 'dashboard/public/locales/*.json' || true)
            fi
          fi
          files=$(printf '%s\n' "$files" | sed '/^$/d' | jq -R -s -c 'split("\n")[:-1]')
          echo "files=$files" >> "$GITHUB_OUTPUT"

  run-script:
    needs: find-locales
    if: ${{ needs.find-locales.outputs.files != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        locale-file: ${{ fromJson(needs.find-locales.outputs.files) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run script with locale file
        run: |
          bash tools/check_translations.sh "${{ matrix.locale-file }}"
        shell: bash
