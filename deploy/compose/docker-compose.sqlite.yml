# =============================================================================
# Aegis Panel — S1 light variant (SQLite, no postgres / redis).
#
# Refs: docs/ai-cto/SPEC-deploy.md §"S1 轻量变体". Trades the alembic init
# container for an inline `alembic upgrade head` in the panel entrypoint, so
# minor extra startup latency in exchange for one less container on a small
# VPS (≥1 GiB RAM target).
#
# Loaded by install.sh step 6 when --db sqlite (or RAM<2GiB auto-downgrade).
# =============================================================================

services:
  panel:
    image: dawsh/marzneshin:${AEGIS_VERSION:-latest}
    container_name: aegis-panel
    restart: always
    network_mode: host
    env_file:
      - /opt/aegis/.env
    volumes:
      - /opt/aegis/data/panel:/var/lib/marzneshin
    # Inline migration: SQLite is fast enough that we tolerate an extra ~2s
    # at boot for the simpler topology.
    entrypoint:
      - /bin/sh
      - -c
      - |
        alembic upgrade head && exec python main.py
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PANEL_PORT:-8443}/api/system/info || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  marznode:
    image: dawsh/marznode:${AEGIS_VERSION:-latest}
    container_name: aegis-marznode
    restart: always
    network_mode: host
    environment:
      SERVICE_ADDRESS: "127.0.0.1"
      SERVICE_PORT: "${MARZNODE_GRPC_PORT:-62051}"
      INSECURE: "True"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/lib/xray"
      XRAY_CONFIG_PATH: "/var/lib/marznode/xray_config.json"
    volumes:
      - /opt/aegis/data/marznode:/var/lib/marznode
    depends_on:
      panel:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: aegis-nginx
    restart: always
    network_mode: host
    volumes:
      - /opt/aegis/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      panel:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
