<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/portal/assets/project-icon.png" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Nilou Network — Managed open-source proxy infrastructure</title>
    <meta
      name="description"
      content="Self-hosted open-source apps, run by an independent operator. Auditable, transparent, won't disappear."
    />
    <script>
      // SPA fallback shim — backend `_SPAStaticFiles` serves index.html
      // for unknown /portal/* paths so a deep link like
      // `nilou.cc/portal/login` doesn't 404. Our hash router (Atoms.jsx)
      // reads `window.location.hash`, NOT the path. Convert
      //   /portal/login        → /portal/#/login
      //   /portal/panel/nodes  → /portal/#/panel/nodes
      // before React boots so the user lands on the requested page.
      // No-op when hash is already set, when at the bare /portal/, or
      // when running outside the /portal/ mount (dev server).
      (function () {
        var p = window.location.pathname;
        var prefix = '/portal/';
        if (window.location.hash || !p.startsWith(prefix)) return;
        var sub = p.slice(prefix.length).replace(/\/$/, '');
        if (!sub) return;
        window.location.replace(prefix + '#/' + sub + window.location.search);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
