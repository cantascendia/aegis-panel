<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:flex;gap:14px;align-items:center">
    <div style="width:120px;height:80px;background:#faf6ee;border:1px solid #f0e6d3;border-radius:10px;display:grid;place-items:center;color:#3a9188;position:relative;overflow:hidden">
      <svg width="120" height="120" viewBox="0 0 200 200" style="position:absolute;opacity:0.5"><circle cx="100" cy="100" r="40" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/><circle cx="100" cy="100" r="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/><circle cx="100" cy="100" r="80" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/></svg>
    </div>
    <div style="flex:1">
      <div style="font-family:var(--font-body);font-weight:600;color:#1e3a5f;font-size:14px">Water ripples</div>
      <div style="font-family:var(--font-body);color:#3d4a66;font-size:12px;line-height:1.55;margin-top:4px">Concentric SVG circles, two large blobs in hero corners. 16s + 22s float keyframes (translate ±24px, scale 1.04, opacity 0.4↔0.5). Reduced-motion aware.</div>
    </div>
  </div>
  <div style="margin-top:12px;display:flex;gap:14px;align-items:center">
    <div style="width:120px;height:80px;background:radial-gradient(ellipse 80% 80% at 50% 30%,#f5ecdc 0%,#fff 70%);border:1px solid #f0e6d3;border-radius:10px"></div>
    <div style="flex:1">
      <div style="font-family:var(--font-body);font-weight:600;color:#1e3a5f;font-size:14px">Hero cream wash</div>
      <div style="font-family:var(--font-body);color:#3d4a66;font-size:12px;line-height:1.55;margin-top:4px">Radial gradient ellipse 80% 60% at 50% 0% — cream-warm to transparent. The only background gradient on hero.</div>
    </div>
  </div>
</div></body></html>
