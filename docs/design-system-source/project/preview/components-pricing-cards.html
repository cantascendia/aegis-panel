<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card" style="background:linear-gradient(180deg,#faf6ee,#f5ecdc)">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="background:#fff;border:1px solid #f0e6d3;border-radius:10px;padding:24px 18px;text-align:center;box-shadow:0 1px 2px rgba(20,41,64,0.04),0 1px 3px rgba(20,41,64,0.06);position:relative">
      <span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#3a9188;color:#fff;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:5px 12px;border-radius:999px">Monthly</span>
      <div style="color:#1e3a5f;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin:8px 0 14px">Monthly</div>
      <div style="font-family:var(--font-display);color:#3a9188;font-size:42px;font-weight:500;line-height:1">¥30</div>
      <div style="color:#8a96b0;font-size:12px;margin-top:4px">per month</div>
    </div>
    <div style="background:linear-gradient(180deg,#fff,#f5ecdc);border:1px solid #3a9188;border-radius:10px;padding:24px 18px;text-align:center;box-shadow:0 1px 2px rgba(20,41,64,0.04),0 1px 3px rgba(20,41,64,0.06);position:relative">
      <span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#c9a253;color:#1e3a5f;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:5px 12px;border-radius:999px">Annual · ~33% off</span>
      <div style="color:#1e3a5f;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin:8px 0 14px">Annual</div>
      <div style="font-family:var(--font-display);color:#3a9188;font-size:42px;font-weight:500;line-height:1">¥240</div>
      <div style="color:#8a96b0;font-size:12px;margin-top:4px">per year</div>
    </div>
  </div>
</div></body></html>
