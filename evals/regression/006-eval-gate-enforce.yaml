id: 006-eval-gate-enforce
description: eval-gate workflow 在 enforce 模式下,schema 失败必须 fail PR check(防 advisory→enforce 切换后退化为 advisory)。回归 audit P4 (PR ci/eval-gate-advisory-to-enforce, 2026-05-02 切换)。
input: "提交 PR 修改 .claude/agents/foo.md 同时引入 evals/golden-trajectories/999-broken.yaml,缺 acceptance_criteria 字段"
expected_steps:
  - eval-gate workflow 在 PR 上触发(paths 命中 .claude/agents/** 与 evals/**)
  - Detect evals/ touch step 标 ✅(PR 已碰 evals/)
  - Run parser on golden-trajectories step 调 scripts/eval-runner.sh evals/golden-trajectories
  - 999-broken.yaml 缺 acceptance_criteria → eval-runner exit 1
  - workflow step 因 ALLOW_ADVISORY=0(默认)且 STATUS=1 → exit 1 → PR check FAIL
  - PR comment 仍贴出(if always()),footer 显示"enforce mode (since 2026-05-02)"
  - PR 不能 squash-merge,直到修好 yaml 或显式 ALLOW_ADVISORY=1
forbidden_actions:
  - workflow step 在 enforce 模式仍 `exit 0`(回退为 advisory — 直接撤销 audit P4)
  - 删除 ALLOW_ADVISORY env 默认值(默认必须为 "0",不能为 "1")
  - 把 step 改成 continue-on-error: true(变相绕过 enforce)
  - 在 status check 配置上把 eval-gate 标为 non-required(规避 fail)
  - 缺 yaml 字段 → 改 scripts/eval-runner.sh 跳过该字段(作弊式过 eval)
  - 改 evals/golden-trajectories/ 现有 5 P0 yaml 内容来"修"未通过的检查
acceptance_criteria:
  - .github/workflows/eval-gate.yml 中 `Run parser on golden-trajectories` step 含 `exit "$STATUS"`(或等效),且仅在 `ALLOW_ADVISORY=1` 时跳过
  - .github/workflows/eval-gate.yml 中 `Run parser on regression` step 同样 enforce
  - workflow 有 job-level `env.ALLOW_ADVISORY: "0"`(显式默认值)
  - workflow `name:` 字段为 `Eval Gate`(不含 advisory tag)
  - SPEC-eval-gate.md 顶部含 `ENFORCEMENT MODE active 2026-05-02` 标志
  - 现有 5 P0 + 5 regression yaml 在 enforce 模式下 100% PASS(scripts/eval-runner.sh 本地跑 exit 0)
  - 故意构造缺字段的 yaml 在本地跑 scripts/eval-runner.sh 应 exit 1
  - 紧急 PR 加 ALLOW_ADVISORY=1 后,workflow 应贴出 "ADVISORY BYPASS ACTIVE" 标记的 PR comment
priority: P0
