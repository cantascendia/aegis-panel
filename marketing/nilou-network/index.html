<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nilou Network</title>
  <link rel="icon" href="assets/lotus.svg" type="image/svg+xml" />
  <link rel="alternate" hreflang="en" href="/en/" />
  <link rel="alternate" hreflang="ja" href="/ja/" />
  <link rel="alternate" hreflang="zh" href="/zh/" />
  <meta http-equiv="refresh" content="0; url=/en/" />
  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      var target = '/en/';
      if (lang.indexOf('ja') === 0) target = '/ja/';
      else if (lang.indexOf('zh') === 0) target = '/zh/';
      window.location.replace(target);
    })();
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 64px 24px; text-align: center; color: #1e3a5f; }
    a { color: #3a9188; margin: 0 12px; }
  </style>
</head>
<body>
  <h1>Nilou Network</h1>
  <p>Redirecting to your language…</p>
  <p>
    <a href="/en/">English</a> ·
    <a href="/ja/">日本語</a> ·
    <a href="/zh/">中文</a>
  </p>
</body>
</html>
